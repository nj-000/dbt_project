version: 2

models:

  # =========================================
  # INTERMEDIATE MODELS
  # =========================================

  - name: int_trips_unioned
    description: Unioned green and yellow taxi trip data

  - name: int_trips
    description: Cleaned and enriched trip data

    columns:

      - name: trip_id
        description: Unique trip identifier
        data_tests:
          - not_null

      - name: service_type
        description: Taxi service type
        data_tests:
          - accepted_values:
              arguments:
                values: ['Green', 'Yellow']

        