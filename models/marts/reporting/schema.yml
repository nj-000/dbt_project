version: 2

models:

  # =========================================
  # AGGREGATED MARTS
  # =========================================

  - name: fct_monthly_zone_revenue
    description: Monthly revenue aggregated by pickup zone and service type

    columns:

      - name: pickup_zone
        description: Pickup zone name
        data_tests:
          - not_null

      - name: revenue_month
        description: Revenue month
        data_tests:
          - not_null

      - name: service_type
        description: Taxi service type
        data_tests:
          - accepted_values:
              arguments:
                values: ['Green', 'Yellow']

      - name: revenue_monthly_total_amount
        description: Monthly total revenue

      - name: total_monthly_trips
        description: Monthly trip count
        